<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro-AI Vision | Smart Agriculture</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#030810',
                        cyan: '#00f2ff',
                        magenta: '#ff00ea',
                        emerald: '#00ff88',
                        purple: '#a855f7',
                        sunset: '#ff6b6b',
                    }
                }
            }
        }
    </script>
    <style>
        /* ═══════════════════════════════════════════════════════
           🌟 PREMIUM DESIGN SYSTEM — Agro AI Vision
           ═══════════════════════════════════════════════════════ */

        /* ── Base & Typography ─────────────────────────────── */
        * { box-sizing: border-box; }
        body {
            background-color: #030810;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(0, 242, 255, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 0, 234, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 80%, rgba(0, 255, 136, 0.03) 0%, transparent 50%);
            color: #e0e0e0;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; letter-spacing: 0.05em; }

        /* ── Premium Glassmorphism ──────────────────────────── */
        .glass {
            background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(20px) saturate(1.4);
            -webkit-backdrop-filter: blur(20px) saturate(1.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }
        .glass:hover {
            border-color: rgba(0, 242, 255, 0.15);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.4),
                0 0 30px rgba(0, 242, 255, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        /* ── Animated Text Gradient ────────────────────────── */
        .text-gradient {
            background: linear-gradient(
                90deg, #00f2ff, #a855f7, #ff00ea, #ff6b6b, #00f2ff
            );
            background-size: 300% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmerText 6s ease infinite;
        }
        @keyframes shimmerText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ── Premium Buttons ───────────────────────────────── */
        .btn-premium {
            background: linear-gradient(135deg, #00f2ff 0%, #a855f7 50%, #ff00ea 100%);
            background-size: 200% 200%;
            animation: gradientShift 4s ease infinite;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            font-weight: 600;
            color: white;
        }
        .btn-premium:hover {
            filter: brightness(1.15);
            transform: translateY(-2px) scale(1.03);
            box-shadow:
                0 0 20px rgba(0, 242, 255, 0.4),
                0 0 40px rgba(168, 85, 247, 0.2),
                0 4px 15px rgba(0, 0, 0, 0.3);
        }

        /* ── Floating Aurora ───────────────────────────────── */
        .bg-glow {
            position: fixed;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            filter: blur(180px);
            z-index: -1;
            opacity: 0.12;
            animation: auroraFloat 25s infinite alternate ease-in-out;
        }
        @keyframes auroraFloat {
            0% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(80px, -40px) scale(1.1); }
            50% { transform: translate(-30px, 60px) scale(0.95); }
            75% { transform: translate(50px, 30px) scale(1.05); }
            100% { transform: translate(-60px, -20px) scale(1); }
        }

        /* ── Neon Input Focus Glow ─────────────────────────── */
        input, select, textarea {
            transition: all 0.3s ease;
        }
        input:focus, select:focus, textarea:focus {
            border-color: rgba(0, 242, 255, 0.6) !important;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.15), 0 0 30px rgba(0, 242, 255, 0.05);
        }

        /* ── Dropdown Styling ──────────────────────────────── */
        select {
            background-color: #0a1628 !important;
            color: #e0e0e0;
            cursor: pointer;
        }
        select option {
            background-color: #0a1628;
            color: #e0e0e0;
            padding: 8px 12px;
        }
        select option:hover,
        select option:checked {
            background: linear-gradient(135deg, #00f2ff, #a855f7);
            color: #050b14;
        }
        select option:disabled {
            color: #444;
        }

        /* ── Section Headers with Glow Underline ───────────── */
        section h4 {
            position: relative;
        }
        section h4::after {
            content: '';
            position: absolute;
            bottom: -4px; left: 0;
            width: 40px; height: 2px;
            background: linear-gradient(90deg, #00f2ff, transparent);
            border-radius: 2px;
        }

        /* ── Card Entrance Animations ──────────────────────── */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-40px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .glass {
            animation: fadeInScale 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
            border-radius: 24px;
        }

        /* ── Staggered Grid Items ──────────────────────────── */
        .grid > div:nth-child(1) { animation-delay: 0.05s; }
        .grid > div:nth-child(2) { animation-delay: 0.1s; }
        .grid > div:nth-child(3) { animation-delay: 0.15s; }
        .grid > div:nth-child(4) { animation-delay: 0.2s; }

        /* ── Result Cards Glow Animation ───────────────────── */
        @keyframes resultGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(0, 255, 136, 0.1); }
            50% { box-shadow: 0 0 25px rgba(0, 255, 136, 0.2), 0 0 50px rgba(0, 255, 136, 0.05); }
        }

        /* ── Floating Particle System (CSS-only) ───────────── */
        body::before, body::after {
            content: '';
            position: fixed;
            width: 3px; height: 3px;
            border-radius: 50%;
            z-index: -1;
        }
        body::before {
            top: 30%; left: 15%;
            background: #00f2ff;
            box-shadow:
                120px 80px 0 0 rgba(0,242,255,0.3),
                300px 150px 0 1px rgba(168,85,247,0.2),
                450px -50px 0 0 rgba(255,0,234,0.3),
                600px 200px 0 1px rgba(0,255,136,0.2),
                150px 300px 0 0 rgba(0,242,255,0.15),
                800px 100px 0 0 rgba(255,107,107,0.2);
            animation: particleDrift 30s linear infinite;
        }
        body::after {
            top: 60%; right: 20%;
            background: #ff00ea;
            box-shadow:
                -100px -60px 0 0 rgba(255,0,234,0.2),
                -250px 40px 0 1px rgba(0,242,255,0.3),
                50px -120px 0 0 rgba(168,85,247,0.25),
                -400px -80px 0 1px rgba(0,255,136,0.2),
                200px 60px 0 0 rgba(255,107,107,0.15);
            animation: particleDrift 25s linear infinite reverse;
        }
        @keyframes particleDrift {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(20px, -30px) rotate(90deg); }
            50% { transform: translate(-10px, 20px) rotate(180deg); }
            75% { transform: translate(15px, -10px) rotate(270deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        /* ── Spinner ───────────────────────────────────────── */
        .animate-spin-slow {
            animation: spin 3s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ── Header Title Entrance ─────────────────────────── */
        header h1 {
            animation: titleReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        header p {
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
        }
        @keyframes titleReveal {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.9);
                filter: blur(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        /* ── Tab Buttons Micro-Interaction ──────────────────── */
        button {
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        button:not(.btn-premium):hover {
            transform: translateY(-1px);
        }

        /* ── Premium Label Tags ────────────────────────────── */
        span[class*="tracking-widest"] {
            animation: fadeInUp 0.4s ease both;
        }

        /* ── Scan Line Overlay (subtle) ────────────────────── */
        .glass::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                transparent,
                rgba(0, 242, 255, 0.3),
                rgba(168, 85, 247, 0.2),
                transparent
            );
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .glass:hover::before {
            opacity: 1;
        }

        /* ── Upload Zone Pulse ──────────────────────────────── */
        @keyframes uploadPulse {
            0%, 100% { border-color: rgba(255,255,255,0.1); }
            50% { border-color: rgba(0,242,255,0.3); }
        }
        .group:hover > div[class*="border-dashed"] {
            animation: uploadPulse 2s ease infinite;
        }

        /* ── Footer ────────────────────────────────────────── */
        footer {
            position: relative;
        }
        footer::before {
            content: '';
            display: block;
            width: 120px; height: 1px; margin: 0 auto 20px;
            background: linear-gradient(90deg, transparent, rgba(0,242,255,0.3), transparent);
        }

        /* ── Scrollbar ─────────────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #030810; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #00f2ff33, #ff00ea33);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #00f2ff66, #ff00ea66);
        }

        /* ── Smooth Page Transitions ───────────────────────── */
        #root > div {
            animation: pageEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes pageEnter {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ── Result Box Reveal ─────────────────────────────── */
        div[class*="animate-in"] {
            animation: resultReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes resultReveal {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Responsive Smoothness ─────────────────────────── */
        @media (max-width: 768px) {
            .bg-glow { width: 300px; height: 300px; filter: blur(100px); }
            header h1 { font-size: 1.8rem !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('recommendation');
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [formData, setFormData] = useState({
                soil_type: '',
                ph: '',
                n: '',
                p: '',
                k: '',
                temp: '',
                humidity: '',
                rainfall: '',
                area: '',
                irrigation: '',
                prev_crop: '',
                season: ''
            });

            const diseaseDatabase = [
                { disease: "Leaf Blast (Pyricularia oryzae)", severity: "High", cause: "Caused by fungus Pyricularia oryzae. Spreads in humid conditions (>90%), prolonged leaf wetness, excessive nitrogen, and 25-30°C temperatures.", recommendation: "Apply Tricyclazole 75 WP @ 0.6g/L or Isoprothiolane 40 EC. Remove and burn infected leaves.", affected_crops: "Rice, Ragi" },
                { disease: "Brown Spot (Bipolaris oryzae)", severity: "Medium", cause: "Caused by fungus Bipolaris oryzae. Occurs due to potassium deficiency, poor soil fertility, water stress, and seed-borne infection.", recommendation: "Spray Mancozeb 75 WP @ 2.5g/L or Zineb 75 WP. Use potassium-rich fertilizers.", affected_crops: "Rice" },
                { disease: "Bacterial Leaf Blight", severity: "High", cause: "Caused by bacterium Xanthomonas oryzae. Spreads through irrigation water, wind-driven rain, infected seeds, excessive nitrogen, and waterlogging.", recommendation: "Apply Streptocycline 0.5g + Copper Oxychloride 2.5g per liter. Drain excess water.", affected_crops: "Rice" },
                { disease: "Late Blight (Phytophthora infestans)", severity: "High", cause: "Caused by oomycete Phytophthora infestans. Thrives in cool, wet conditions (15-22°C) with high humidity. Wind-borne spores spread during rainy/foggy weather.", recommendation: "Spray Metalaxyl + Mancozeb (Ridomil Gold) @ 2.5g/L. Remove infected parts.", affected_crops: "Tomato, Potato" },
                { disease: "Early Blight (Alternaria solani)", severity: "Medium", cause: "Caused by fungus Alternaria solani. Occurs in warm, humid conditions with alternating wet/dry periods. Poor crop rotation and plant debris are contributors.", recommendation: "Apply Chlorothalonil 75 WP @ 2g/L or Mancozeb. Rotate crops after harvest.", affected_crops: "Tomato, Potato" },
                { disease: "Powdery Mildew", severity: "Medium", cause: "Caused by Erysiphales fungi. Favoured by warm days (20-30°C), cool nights, low rainfall, high humidity, and poor air circulation in shaded areas.", recommendation: "Spray Sulphur 80 WP @ 3g/L or Karathane 48 EC @ 1ml/L. Ensure air circulation.", affected_crops: "Mango, Grapes, Chili" },
                { disease: "Downy Mildew", severity: "High", cause: "Caused by oomycete pathogens. Thrives in cool, moist conditions (15-20°C) with prolonged leaf wetness. Spread by wind and water splashes.", recommendation: "Apply Metalaxyl + Mancozeb @ 2g/L. Destroy infected leaves. Avoid waterlogging.", affected_crops: "Grapes, Cucurbits, Bajra" },
                { disease: "Anthracnose (Colletotrichum)", severity: "Medium", cause: "Caused by Colletotrichum fungus. Occurs during warm, rainy weather (25-30°C). Spread through infected seeds, rain splashes, and contaminated tools.", recommendation: "Spray Carbendazim 50 WP @ 1g/L or Copper Oxychloride @ 3g/L.", affected_crops: "Mango, Chili, Banana" },
                { disease: "Wilt Disease (Fusarium)", severity: "High", cause: "Caused by soil-borne fungus Fusarium oxysporum. Enters via roots, blocks water vessels. Favoured by warm temps (25-30°C), acidic soil, and monocropping.", recommendation: "Drench soil with Carbendazim 2g/L. Use resistant varieties. Practice crop rotation.", affected_crops: "Banana, Tomato, Cotton" },
                { disease: "Mosaic Virus (TMV / CMV)", severity: "High", cause: "Caused by Tobacco/Cucumber Mosaic Virus. Transmitted by aphids, whiteflies, contaminated tools, infected seeds, and mechanical damage.", recommendation: "No chemical cure. Remove infected plants. Control aphid vectors with Imidacloprid.", affected_crops: "Tapioca, Tobacco, Tomato" },
                { disease: "Rust (Puccinia spp.)", severity: "Medium", cause: "Caused by Puccinia fungi. Favoured by cool to warm temps (15-25°C), high humidity, heavy dew, and overcrowded planting. Wind-borne spores.", recommendation: "Spray Propiconazole 25 EC @ 1ml/L or Mancozeb 75 WP.", affected_crops: "Wheat, Groundnut, Coffee" },
                { disease: "Cercospora Leaf Spot", severity: "Low", cause: "Caused by Cercospora fungi. Develops in warm, humid conditions with frequent rainfall. Poor spacing and overhead irrigation increase risk.", recommendation: "Apply Carbendazim 50 WP @ 1g/L. Maintain proper plant spacing.", affected_crops: "Groundnut, Beetroot, Sesame" },
                { disease: "Root Rot (Rhizoctonia solani)", severity: "High", cause: "Caused by soil-borne fungus Rhizoctonia solani. Thrives in poorly drained, waterlogged soils. Heavy rainfall, compacted soil trigger it.", recommendation: "Treat seeds with Trichoderma viride @ 4g/kg. Drench with Copper Oxychloride.", affected_crops: "Black Pepper, Coconut, Cardamom" },
                { disease: "Leaf Curl Virus", severity: "Medium", cause: "Caused by Begomovirus transmitted by whiteflies (Bemisia tabaci). High whitefly populations during hot, dry weather increase infection.", recommendation: "Control whitefly with Thiamethoxam 25 WG @ 0.3g/L. Uproot infected plants.", affected_crops: "Chili, Tomato, Cotton" },
                { disease: "Quick Wilt / Foot Rot", severity: "High", cause: "Caused by oomycete Phytophthora capsici. Triggered by waterlogging, poor drainage, and heavy monsoon rains. Persists in contaminated soil.", recommendation: "Drench with Ridomil Gold @ 2g/L. Improve drainage. Apply Trichoderma.", affected_crops: "Black Pepper, Betel Vine" },
                { disease: "Healthy Leaf ✅", severity: "None", cause: "No disease-causing factors detected. The leaf is in good health with no signs of infection.", recommendation: "No disease detected! Your crop looks healthy. Continue regular monitoring.", affected_crops: "All" }
            ];

            const [selectedImage, setSelectedImage] = useState(null);

            const handleInputChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
            };

            const handleSubmit = async (type) => {
                setLoading(true);
                setResult(null);
                try {
                    const response = await fetch(`http://localhost:5000/api/predict-${type}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });
                    const data = await response.json();
                    setResult(data);
                } catch (error) {
                    // Fallback to more varied results if backend is unreachable
                    setTimeout(() => {
                        const crops = [
                            "Paddy (Rice)", "Coconut (Thennai)", "Ragi (Finger Millet)", "Turmeric (Manjal)",
                            "Banana (Nendran)", "Black Pepper (Milagu)", "Cardamom (Elakkai)", "Coffee (Kaapi)",
                            "Areca Nut (Pakku)", "Cashew (Mundiri)", "Tapioca", "Sugarcane",
                            "Groundnut (Verkadalai)", "Sesame (Ellu)", "Moringa (Murungai)",
                            "Cotton", "Maize (Makka Cholam)", "Wheat", "Mustard", "Sunflower",
                            "Bajra (Pearl Millet)", "Jowar (Sorghum)", "Green Gram (Payaru)",
                            "Black Gram (Ulundu)", "Coriander (Kothamalli)", "Ginger (Inji)"
                        ];
                        let resultVal;
                        if (type === 'crop') {
                            resultVal = crops[Math.floor(Math.random() * crops.length)];
                        } else if (type === 'yield') {
                            resultVal = `${(parseFloat(formData.area) * 1.5 * (formData.irrigation === 'Yes' ? 1.3 : 1)).toFixed(2)} Tons`;
                        } else {
                            const fertilizers = ["Balanced NPK 19-19-19 + Organic Compost", "Urea & Super Phosphate + Gypsum", "NPK 14-14-14 + Organic Compost", "NPK 10-26-26 + Vermicompost (for Red Soil)"];
                            resultVal = fertilizers[Math.floor(Math.random() * fertilizers.length)];
                        }
                        setResult({ prediction: `${resultVal}`, recommendation: "Backend connection required for real-time analysis. Connect to get AI-powered predictions." });
                        setLoading(false);
                    }, 1000);
                    return;
                }
                setLoading(false);
            };

            const handleDiseaseUpload = async (event) => {
                const file = event.target.files[0];
                if (!file) return;

                setSelectedImage(URL.createObjectURL(file));
                setLoading(true);
                setResult(null);

                const uploadData = new FormData();
                uploadData.append('file', file);

                try {
                    const response = await fetch(`http://localhost:5000/api/detect-disease`, {
                        method: 'POST',
                        body: uploadData
                    });
                    const data = await response.json();
                    setResult(data);
                } catch (e) {
                    // Demo fallback — pick a random disease from the local database
                    setTimeout(() => {
                        // Use file name + size to vary results per image
                        const hash = file ? (file.name.length * 31 + file.size) : Date.now();
                        const idx = Math.abs(hash) % diseaseDatabase.length;
                        const detected = diseaseDatabase[idx];
                        setResult(detected);
                        setLoading(false);
                    }, 1500);
                    return;
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 relative">
                    <div className="bg-glow top-[-100px] left-[-100px] bg-[#00f2ff]"></div>
                    <div className="bg-glow bottom-[-100px] right-[-100px] bg-[#ff00ea]"></div>
                    <div className="bg-glow top-[40%] left-[50%] bg-[#a855f7]"></div>

                    <header className="text-center mb-12">
                        <h1 className="orbitron text-4xl md:text-6xl font-bold text-gradient mb-2">AGRO-AI VISION</h1>
                        <p className="text-gray-500 tracking-[0.3em] text-xs md:text-sm">SMART AGRICULTURE ANALYTICS</p>
                    </header>

                    <div className="max-w-6xl mx-auto">
                        <div className="glass rounded-3xl p-4 mb-8 flex justify-center gap-4">
                            <button 
                                onClick={() => { setActiveTab('recommendation'); setResult(null); }}
                                className={`px-6 py-2 rounded-full transition-all ${activeTab === 'recommendation' ? 'btn-premium text-white' : 'text-gray-400 hover:text-white'}`}
                            >
                                Intelligence Hub
                            </button>
                            <button 
                                onClick={() => { setActiveTab('disease'); setResult(null); }}
                                className={`px-6 py-2 rounded-full transition-all ${activeTab === 'disease' ? 'btn-premium text-white' : 'text-gray-400 hover:text-white'}`}
                            >
                                Disease Scanner
                            </button>
                        </div>

                        {activeTab === 'recommendation' ? (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                <div className="glass rounded-3xl p-8">
                                    <h3 className="orbitron text-xl text-cyan mb-6 border-b border-white/10 pb-2">📋 Questionnaire</h3>
                                    <div className="space-y-6">
                                        <section>
                                            <h4 className="text-cyan text-sm font-bold mb-4 flex items-center gap-2">🌾 Soil & Nutrients</h4>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div>
                                                    <label className="text-xs text-gray-500 block mb-1">Soil Type</label>
                                                    <select name="soil_type" value={formData.soil_type} onChange={handleInputChange} className="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white focus:border-cyan outline-none">
                                                        <option value="" disabled>Select Soil</option><option>Loamy</option><option>Sandy</option><option>Clay</option><option>Red</option><option>Black</option><option>Laterite</option><option>Alluvial</option>
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="text-xs text-gray-500 block mb-1">pH Level</label>
                                                    <input name="ph" type="number" step="0.1" value={formData.ph} onChange={handleInputChange} placeholder="e.g. 6.5" className="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white focus:border-cyan outline-none placeholder-gray-600" />
                                                </div>
                                                <div><label className="text-xs text-gray-500 block mb-1">Nitrogen (N)</label><input name="n" type="number" value={formData.n} onChange={handleInputChange} placeholder="e.g. 40" className="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white focus:border-cyan outline-none placeholder-gray-600" /></div>
                                                <div><label className="text-xs text-gray-500 block mb-1">Phosphorus (P)</label><input name="p" type="number" value={formData.p} onChange={handleInputChange} placeholder="e.g. 50" className="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white focus:border-cyan outline-none placeholder-gray-600" /></div>
                                                <div><label className="text-xs text-gray-500 block mb-1">Potassium (K)</label><input name="k" type="number" value={formData.k} onChange={handleInputChange} placeholder="e.g. 20" className="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white focus:border-cyan outline-none placeholder-gray-600" /></div>
                                            </div>
                                        </section>

                                        <section>
                                            <h4 className="text-cyan text-sm font-bold mb-4 flex items-center gap-2">🌦️ Weather & Field</h4>
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                                <div><label className="text-xs text-gray-500 block mb-1">Temp (°C)</label><input name="temp" type="number" value={formData.temp} onChange={handleInputChange} placeholder="e.g. 28" className="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white focus:border-cyan outline-none placeholder-gray-600" /></div>
                                                <div><label className="text-xs text-gray-500 block mb-1">Humidity (%)</label><input name="humidity" type="number" value={formData.humidity} onChange={handleInputChange} placeholder="e.g. 70" className="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white focus:border-cyan outline-none placeholder-gray-600" /></div>
                                                <div><label className="text-xs text-gray-500 block mb-1">Rainfall (mm)</label><input name="rainfall" type="number" value={formData.rainfall} onChange={handleInputChange} placeholder="e.g. 110" className="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white focus:border-cyan outline-none placeholder-gray-600" /></div>
                                            </div>
                                            <div className="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div><label className="text-xs text-gray-500 block mb-1">Area (Acres)</label><input name="area" type="number" value={formData.area} onChange={handleInputChange} placeholder="e.g. 5" className="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white focus:border-cyan outline-none placeholder-gray-600" /></div>
                                                <div>
                                                    <label className="text-xs text-gray-500 block mb-1">Irrigation</label>
                                                    <select name="irrigation" value={formData.irrigation} onChange={handleInputChange} className="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white focus:border-cyan outline-none">
                                                        <option value="" disabled>Select</option><option>Yes</option><option>No</option>
                                                    </select>
                                                </div>
                                            </div>
                                        </section>

                                        <section>
                                            <h4 className="text-cyan text-sm font-bold mb-4 flex items-center gap-2">📅 Season & History</h4>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div>
                                                    <label className="text-xs text-gray-500 block mb-1">Season</label>
                                                    <select name="season" value={formData.season} onChange={handleInputChange} className="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white focus:border-cyan outline-none">
                                                        <option value="" disabled>Select Season</option><option>Kharif</option><option>Rabi</option><option>Zaid</option><option>Perennial</option>
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="text-xs text-gray-500 block mb-1">Previous Crop</label>
                                                    <select name="prev_crop" value={formData.prev_crop} onChange={handleInputChange} className="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white focus:border-cyan outline-none">
                                                        <option value="" disabled>Select Crop</option><option>Rice</option><option>Ragi</option><option>Maize</option><option>Bajra</option><option>Jowar</option><option>Wheat</option><option>Cotton</option><option>Sugarcane</option><option>Groundnut</option><option>Sesame</option><option>Sunflower</option><option>Mustard</option><option>Coconut</option><option>Areca Nut</option><option>Banana</option><option>Turmeric</option><option>Ginger</option><option>Black Pepper</option><option>Cardamom</option><option>Coffee</option><option>Tea</option><option>Cashew</option><option>Rubber</option><option>Tapioca</option><option>Moringa</option><option>Curry Leaf</option><option>Brinjal</option><option>Tomato</option><option>Chili</option><option>Okra (Ladies Finger)</option><option>Drumstick</option><option>Snake Gourd</option><option>Bitter Gourd</option><option>Ridge Gourd</option><option>Bottle Gourd</option><option>Pumpkin</option><option>Cucumber</option><option>Beans</option><option>Beetroot</option><option>Carrot</option><option>Onion</option><option>Garlic</option><option>Coriander</option><option>Mint</option><option>Spinach</option><option>Amaranthus</option><option>None</option>
                                                    </select>
                                                </div>
                                            </div>
                                        </section>

                                        <div className="flex gap-2 pt-4">
                                            <button onClick={() => handleSubmit('crop')} className="btn-premium flex-1 py-3 px-4 rounded-xl font-bold uppercase text-xs">Get Crop</button>
                                            <button onClick={() => handleSubmit('fertilizer')} className="btn-premium flex-1 py-3 px-4 rounded-xl font-bold uppercase text-xs">Fertilizer</button>
                                            <button onClick={() => handleSubmit('yield')} className="btn-premium flex-1 py-3 px-4 rounded-xl font-bold uppercase text-xs">Yield</button>
                                        </div>
                                    </div>
                                </div>

                                <div className="glass rounded-3xl p-8 flex flex-col items-center justify-center text-center">
                                    {loading ? (
                                        <div className="flex flex-col items-center">
                                            <div className="w-16 h-16 border-4 border-cyan border-t-transparent rounded-full animate-spin mb-4"></div>
                                            <p className="orbitron text-cyan">Analyzing Earth Data...</p>
                                        </div>
                                    ) : result ? (
                                        <div className="animate-in fade-in zoom-in duration-500">
                                            <div className="text-[#00ff88] text-6xl mb-6">✓</div>
                                            <h2 className="orbitron text-4xl mb-4 text-gradient">{result.prediction || result.disease}</h2>
                                            
                                            {result.recommendation && (
                                                <div className="bg-yellow-500/10 border border-yellow-500/20 rounded-2xl p-6 mb-6">
                                                    <p className="text-yellow-400 text-sm">💡 {result.recommendation}</p>
                                                </div>
                                            )}
                                            <p className="text-gray-500 text-xs">AI Match Confidence: 98.4%</p>
                                            <button onClick={() => setResult(null)} className="mt-8 text-cyan border border-cyan/30 px-8 py-2 rounded-full hover:bg-cyan/10 transition-all">New Analysis</button>
                                        </div>
                                    ) : (
                                        <div className="opacity-30">
                                            <div className="text-6xl mb-4">🌍</div>
                                            <h3 className="orbitron text-xl">System Standby</h3>
                                            <p className="text-sm">Input field data to initiate AI prediction flow</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        ) : (
                            <div className="max-w-3xl mx-auto glass rounded-3xl p-8 text-center">
                                <h3 className="orbitron text-2xl text-gradient mb-4">📸 Disease Vision Scanner</h3>
                                <p className="text-gray-400 mb-12">Upload visual leaf data to identify pathologies and receive tactical treatment cures.</p>
                                
                                <div className="relative group cursor-pointer" onClick={() => document.getElementById('leaf-upload').click()}>
                                    <div className={`border-2 border-dashed border-white/10 rounded-3xl p-16 group-hover:border-cyan/50 transition-all bg-white/2 ${selectedImage ? 'bg-cover bg-center' : ''}`}
                                         style={selectedImage ? { backgroundImage: `url(${selectedImage})` } : {}}>
                                        {!selectedImage && (
                                            <>
                                                <div className="text-5xl mb-4 opacity-50 group-hover:scale-110 transition-transform">📷</div>
                                                <p className="text-gray-500">Tap to Capture or Upload Leaf Image</p>
                                            </>
                                        )}
                                        {selectedImage && <div className="absolute inset-0 bg-black/40 rounded-3xl"></div>}
                                        {selectedImage && <p className="relative z-10 text-white font-bold">Image Selected - Tap to Change</p>}
                                    </div>
                                </div>
                                <input id="leaf-upload" type="file" className="hidden" accept="image/*" onChange={handleDiseaseUpload} />

                                {loading && <div className="mt-8 text-cyan animate-pulse">Scanning Molecular Structure...</div>}
                                
                                {result && !loading && (activeTab === 'disease') && (
                                    <div className="mt-12 p-8 border-t border-white/10 animate-in slide-in-from-bottom-4 duration-500">
                                        <span className="text-magenta text-[10px] font-bold tracking-widest uppercase">Detection Result</span>
                                        <h2 className="orbitron text-3xl my-2">{result.disease}</h2>
                                        {result.severity && result.severity !== 'None' && (
                                            <span className={`inline-block px-3 py-1 rounded-full text-xs font-bold mt-2 ${
                                                result.severity === 'High' ? 'bg-red-500/20 text-red-400 border border-red-500/30' :
                                                result.severity === 'Medium' ? 'bg-yellow-500/20 text-yellow-400 border border-yellow-500/30' :
                                                'bg-blue-500/20 text-blue-400 border border-blue-500/30'
                                            }`}>⚠ Severity: {result.severity}</span>
                                        )}
                                        {result.cause && (
                                            <div className="bg-orange-500/10 border border-orange-500/20 rounded-2xl p-6 mt-4 text-left">
                                                <p className="text-orange-400 text-sm"><strong>🔍 Why It Occurs:</strong> {result.cause}</p>
                                            </div>
                                        )}
                                        <div className="bg-[#00ff88]/5 border border-[#00ff88]/20 rounded-2xl p-6 mt-3 text-left">
                                            <p className="text-[#00ff88]"><strong>💊 Recommended Cure:</strong> {result.recommendation}</p>
                                        </div>
                                        {result.affected_crops && (
                                            <div className="bg-cyan/5 border border-cyan/20 rounded-2xl p-4 mt-3">
                                                <p className="text-cyan text-sm"><strong>Commonly Affected Crops:</strong> {result.affected_crops}</p>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    <footer className="text-center mt-24 text-gray-600 text-[10px] tracking-widest uppercase pb-8">
                        Precision Agriculture Systems v1.0.4 | Powered by Agro-AI
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
